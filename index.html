<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Mille e Una Notte 2026 - Gestione Iscritti</title>
  <link rel="stylesheet" href="./css/ama-style.css">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <script src="./js/config.js"></script>
  <script src="./js/manage-registration.js"></script>
</head>
<body>
    <h1>Le Mille e Una Notte 2026</h1>
    <h2>&#128182; Gestione Pagamenti Ver. 2.0 &#128182;</h2>
  
  <div class="search-area">

    <!-- Ricerca per codice AMA -->
    <div class="search-box">
      <label>&#128179; Codice Bonifico</label>
      <div class="input-ama-wrapper">
        <span class="prefisso-ama">AMA</span>
        <input
          type="text"
          id="input-ama"
          maxlength="3"
          placeholder="000"
          oninput="onInputAma(this.value)"
          onkeydown="onKeydown(event, 'ama')"
          autocomplete="off"
        >
      </div>
      <div class="autocomplete-list" id="autocomplete-ama"></div>
    </div>

    <!-- Ricerca fulltext -->
    <div class="search-box">
      <label>&#128269; Ricerca libera (nome, cognome, email)</label>
      <input
        type="text"
        id="input-fulltext"
        placeholder="Digita almeno 3 caratteri..."
        oninput="onInputFulltext(this.value)"
        onkeydown="onKeydown(event, 'fulltext')"
        autocomplete="off"
      >
      <div class="autocomplete-list" id="autocomplete-fulltext"></div>
    </div>

  </div>

  <div id="loading">&#9203; Ricerca in corso...</div>
  <div id="nessun-risultato">&#128269; Nessun iscritto trovato per il criterio di ricerca inserito</div>

  <div id="risultati">
    <div id="contatore"></div>
    <table>
      <thead>
        <tr>
          <th>Codice Bonifico</th>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Email</th>
          <th>Partecipanti</th>
          <th>Menu 1</th>
          <th>Menu 2</th>
          <th>Birre</th>
          <th>Totale</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</body>
</html>
