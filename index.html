<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Mille e Una Notte 2026 - Gestione Iscritti</title>
  <link rel="stylesheet" href="./css/ama-style.css">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <script src="./js/config.js"></script>
  <script src="./js/manage-registration.js"></script>
</head>
<body>
    <h1>Le Mille e Una Notte 2026</h1>
    <h2>&#128182; Gestione Pagamenti Ver. 2.0 &#128182;</h2>
  
  <div class="search-area">

    <!-- Ricerca per codice AMA -->
    <div class="search-box">
      <label>&#128179; Codice Bonifico</label>
      <div class="input-ama-wrapper">
        <span class="prefisso-ama">AMA</span>
        <input
          type="text"
          id="input-ama"
          maxlength="3"
          placeholder="000"
          onkeydown="onKeydown(event, 'ama')"
          autocomplete="off"
        >
      </div>
      <div class="autocomplete-list" id="autocomplete-ama"></div>
    </div>

    <!-- Ricerca fulltext -->
    <div class="search-box">
      <label>&#128269; Ricerca libera (nome, cognome, email)</label>
      <input
        type="text"
        id="input-fulltext"
        placeholder="Digita almeno 3 caratteri..."
        onkeydown="onKeydown(event, 'fulltext')"
        autocomplete="off"
      >
      <div class="autocomplete-list" id="autocomplete-fulltext"></div>
    </div>

  </div>

  <div id="loading">&#9203; Ricerca in corso...</div>
  <div id="nessun-risultato">&#128269; Nessun iscritto trovato per il criterio di ricerca inserito</div>

  <div id="risultati">
    <div id="contatore"></div>
    <table>
      <thead>
        <tr>
          <th>Codice Bonifico</th>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Email</th>
          <th>Partecipanti</th>
          <th>Menu 1</th>
          <th>Menu 2</th>
          <th>Birre</th>
          <th>Totale</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <!-- Struttura della Modale -->
<div id="mailModal" class="modal-issue-email">
  <div class="modal-issue-email-maindiv">
    <h3>Invia Segnalazione</h3>
    <hr>
    <label>Destinatario:</label>
    <input type="text" id="modalEmail" style="width:100%; margin-bottom:10px;" readonly>
    
    <label>Oggetto:</label>
    <input type="text" id="modalSubject" style="width:100%; margin-bottom:10px;">
    
    <label>Messaggio:</label>
    <textarea id="modalBody" style="width:100%; height:100px; margin-bottom:10px;"></textarea>
    
    <div style="text-align:right;">
      <button class="btn-issue" onclick="closeMailModal()" style="background:#ccc; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Annulla</button>
      <button class="btn-conferma" onclick="confirmSendMail(this)" style="background:#4285f4; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; margin-left:10px;">Invia</button>
    </div>
  </div>
</div>
</body>
</html>
